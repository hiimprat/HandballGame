<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NY Handball Rally</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="scorebar" aria-label="Scoreboard">
        <div>
          <span class="label">Player</span>
          <strong id="playerScore">0</strong>
        </div>
        <div class="status" id="statusText">Press Space to serve</div>
        <div>
          <span class="label" id="opponentLabel">CPU</span>
          <strong id="cpuScore">0</strong>
        </div>
      </section>

      <section class="onlinebar" aria-label="Online multiplayer">
        <input id="roomInput" type="text" value="handball" maxlength="24" aria-label="Room code" />
        <input id="serverInput" type="url" placeholder="Render server URL" aria-label="Multiplayer server URL" />
        <button id="hostBtn" type="button">Host Online</button>
        <button id="joinBtn" type="button">Join Online</button>
        <span id="networkStatus">Offline</span>
      </section>

      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="960" height="680" aria-label="New York handball game court"></canvas>

        <div class="joystick joystick--move" id="moveStick" aria-label="Movement joystick" role="presentation">
          <div class="joystick__base"><div class="joystick__knob"></div></div>
          <span class="joystick__label">Move</span>
        </div>
        <div class="joystick joystick--aim" id="aimStick" aria-label="Aim joystick" role="presentation">
          <div class="joystick__base"><div class="joystick__knob"></div></div>
          <span class="joystick__label">Aim</span>
        </div>

        <div class="charge-meter" id="chargeMeter" aria-hidden="true">
          <div class="charge-meter__fill" id="chargeFill"></div>
          <span class="charge-meter__label">Kill power</span>
        </div>
      </div>

      <section class="shotbar" aria-label="Shot controls">
        <button id="normalShot" type="button" data-shot="normal">
          Regular
          <kbd class="desktop-control">Left Click</kbd>
          <kbd class="mobile-control">Tap</kbd>
        </button>
        <button id="lobShot" type="button" data-shot="lob">
          Lob
          <kbd class="desktop-control">Middle Click</kbd>
          <kbd class="mobile-control">Tap</kbd>
        </button>
        <button id="killShot" type="button" data-shot="kill">
          Kill
          <kbd class="desktop-control">Right Click</kbd>
          <kbd class="mobile-control">Hold</kbd>
        </button>
      </section>

      <section class="controls" aria-label="Controls">
        <div class="hint"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move</div>
        <div class="hint">Mouse aim</div>
        <div class="hint"><kbd>Left Click</kbd> regular</div>
        <div class="hint"><kbd>Middle Click</kbd> lob</div>
        <div class="hint"><kbd>Right Click</kbd> kill</div>
        <div class="hint touch-hint">Left stick: move &middot; Right stick: aim &middot; Tap a shot button to fire</div>
        <button id="restartBtn" type="button" class="restart-btn" aria-label="Restart match">Restart <kbd class="desktop-only">R</kbd></button>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>
